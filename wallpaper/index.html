<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Fastfetch Wallpaper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="screen">
    <div id="hud">
      <div id="terminal">
        <div id="topRow">
          <pre id="logo"></pre>
          <pre id="sysinfo"></pre>
        </div>

        <pre id="loadSection"></pre>
        <pre id="storageSection"></pre>
        <pre id="audioSection"></pre>
        <pre id="nowPlayingSection"></pre>
        <pre id="asciiArtSection"></pre>
        <pre id="statusLine"></pre>
      </div>
    </div>
  </div>

  <div id="scanlines"></div>
  <div id="vignette"></div>
  <div id="crtGlow"></div>
  <div id="logoShimmer"></div>
  <div id="bgFlicker"></div>

  <script src="app.js"></script>
  <canvas id="asciiCanvas" style="display:none;"></canvas>
    <svg id="wmLogo" viewBox="0 0 320 280">

      <!-- монитор -->
      <rect x="46" y="20" width="228" height="150" rx="22" class="wmFrame"/>

      <!-- экран -->
      <rect x="64" y="38" width="192" height="100" rx="15" class="wmScreen"/>

      <!-- глаз -->
      <path d="M92 88 Q160 48 228 88 Q160 128 92 88 Z" class="wmEye"/>
      <ellipse cx="160" cy="88" rx="21" ry="28" class="wmEye"/>
      <rect x="153" y="62" width="14" height="52" rx="7" class="wmEye"/>

      <!-- ветки слева -->
      <path d="M96 138 Q74 148 68 166 Q84 158 102 170" class="wmBranch"/>
      <path d="M84 150 Q66 158 60 176 Q76 170 92 180" class="wmBranch"/>

      <!-- ветки справа -->
      <path d="M224 138 Q246 148 252 166 Q236 158 218 170" class="wmBranch"/>
      <path d="M236 150 Q254 158 260 176 Q244 170 228 180" class="wmBranch"/>

      <!-- текст -->
      <text x="160" y="222" text-anchor="middle" dominant-baseline="middle" class="wmText">
        MIMISSID
      </text>
    </svg>
</body>
</html>
